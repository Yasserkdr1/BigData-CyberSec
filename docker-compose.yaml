name: "projet-bigdata-cluster"

services:
  hadoop-master:
    image: liliasfaxi/hadoop-cluster:latest
    container_name: hadoop-master
    hostname: hadoop-master
    ports:
      - "9870:9870"   # Interface web HDFS
      - "8088:8088"   # Interface web YARN
      - "7077:7077"   # Spark Master
      - "16010:16010" # Interface web HBase
      - "9092:9092"   # NOUVEAU : Port Kafka pour ton script Python !
      - "9000:9000"
      - "9090:9090"   # HBASE THRIFT SERVER
      - "2181:2181"   # Zookeeper
      - "16000:16000" # HBase Master RPC
    stdin_open: true
    tty: true
    networks:
      - hadoop-network

  hadoop-worker1:
    image: liliasfaxi/hadoop-cluster:latest
    container_name: hadoop-worker1
    hostname: hadoop-worker1
    ports:
      - "8040:8042"
    stdin_open: true
    tty: true
    networks:
      - hadoop-network

  hadoop-worker2:
    image: liliasfaxi/hadoop-cluster:latest
    container_name: hadoop-worker2
    hostname: hadoop-worker2
    ports:
      - "8041:8042"
    stdin_open: true
    tty: true
    networks:
      - hadoop-network
  hadoop-worker3:
    image: liliasfaxi/hadoop-cluster:latest
    container_name: hadoop-worker3
    hostname: hadoop-worker3
    ports:
      - "8042:8042"
    stdin_open: true
    tty: true
    networks:
      - hadoop-network
  hadoop-worker4:
    image: liliasfaxi/hadoop-cluster:latest
    container_name: hadoop-worker4
    hostname: hadoop-worker4
    ports:
      - "8043:8042"
    stdin_open: true
    tty: true
    networks:
      - hadoop-network
  hadoop-worker5:
    image: liliasfaxi/hadoop-cluster:latest
    container_name: hadoop-worker5
    hostname: hadoop-worker5
    ports:
      - "8044:8042"
    stdin_open: true
    tty: true
    networks:
      - hadoop-network


  cassandra:
    image: cassandra:latest
    container_name: cassandra
    hostname: cassandra
    ports:
      - "9042:9042"
    environment:
      MAX_HEAP_SIZE: 2G
      HEAP_NEWSIZE: 400M
    networks:
      - hadoop-network
networks:
  hadoop-network:
    driver: bridge
